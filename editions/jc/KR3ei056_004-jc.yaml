body:
  text: 卷第四產育保慶集方余收產論二十一篇議論精確無所不究蓋國醫博極方書所得之妙惜乎有其說而無其方郭君稽中為時良醫尤長於治產故其切脈用藥屢取奇功一日願以所收家方附於諸論之末遂編為一集真濟眾之異書也古人謂為人子而不學醫者為不孝則有方論而不傳於世者其可謂之仁哉大觀三年九月五日濮陽李師聖述二十一論並增入十八論李師聖編論郭稽中附方第一論曰熱疾胎死腹中者何答曰因母患熱疾至六七日以後臟腑熱極熏蒸其胎是以致死緣兒死身冷不能自出但服黑神散暖其胎須臾胎氣溫暖即自出何以知其胎之已死但看產婦舌色青者是其驗黑神散二方黑神散桂去粗皮不見火銼碎當歸洗去蘆須切焙芍藥洗銼甘草炙銼生乾地黃溫湯洗淨銼忌冷水乾薑宜用炒生薑代之各一兩附子半兩炮去皮臍雄黑豆二兩小者是炒焦去皮上為末每服一錢匕空心溫酒調下蒲黃黑神散此方十八論云產前產後一切疾皆治之雄黑豆二兩小者是去皮秤當歸洗去蘆並須切焙芍藥洗銼甘草炙銼乾薑炮銼肉桂去皮銼不見火生乾地黃溫湯洗銼焙忌冷水蒲黃銀石器內微炒令赤或以紙辛銚子內炒紙黃為度各一兩上為末每服二錢空心溫酒調下若三十已人及生產少婦人不用桂乾薑入炒生薑紅花代之生薑紅花各用二兩經洗者並焙乾第二論曰胎衣不下者何答曰母生子訖血流入衣中衣為血所脹其故不得下治之稍緩脹滿腹中漸次上衝心胸疼痛喘急者難治但服奇命丹以速去衣中之血血散脹消胎衣自下而無所患奪命丹附子半兩炮去皮臍切牡丹皮一兩洗銼乾漆一分搗碎炒煙盡上為末釅醋一升大黃末一兩同熬成膏和藥如桐子大溫酒下五十丸不以時候又十論云但服蒲黃黑神散逐去衣中血即胎下或帶斷亦同第三論曰難產者何答曰胎側有成形塊呼為兒枕子欲生時枕破與敗血裹其子故難產但服勝金散逐其敗血即自生成若逆生橫生並皆主之勝金散麝香一錢共研為細末鼓一兩用舊青皮裹了燒令通紅急以乳捶研為末上為末取秤捶燒紅以酒淬之調下藥一錢匕又十八論云但服蒲黃黑神散解其敗血即自生也或橫生逆生胎衣不下此藥悉治第四論曰產後血運者何答曰產後氣血暴虛未得安靜血隨氣上迷亂心神故眼前生花極甚者令人悶絕不知人口噤神昏氣冷醫者不識呼為暗風若作此治之病必難愈但服清魂散自瘥清魂散澤蘭葉揀淨人參去蘆各一分荊芥穗一兩曬芎半兩洗銼甘草二錢炙銼上為細末每服一錢匕熱湯溫酒各小半盞調勻急灌之下咽喉即開眼氣定省人事又十八論云但服蒲黃黑神散自瘥第五論曰產後口乾痞悶者何答曰產後宮胃大虛血氣未定食麵太早胃不能消化面毒結聚於胃脘上熏腦中是以口乾煩渴心下痞悶醫者不識認為胸膈壅滯以藥下之萬不得一但服見現丸自瘥見現丸薑黃片子者銼荊三稜煨乘熱撕碎焙乾用蓽澄茄不得用火炒陳皮去白高良薑銼碎炒人參去蘆切片蓬莪朮煨乘熱撕銼焙乾用上七味等分為末用細切蘿蔔慢火煮令爛研細將汁煮糊丸梧桐子大每服三十丸蘿蔔湯下不以時候又十八論云但服蒲黃黑神散自瘥第六論曰產後乍寒乍熱者何答曰陰陽不和敗血不散皆令乍寒乍熱產後血氣虛損陰陽不和陰勝則乍寒陽勝則乍熱陰陽相乘則或寒或熱若因產勞傷臟腑血弱不得宣越故令血敗不散入於肺則熱入於脾則寒醫人若誤作瘧疾治之則繆矣陰陽不和宜增損四物湯敗血不散宜奪血丹又問二者何以別之答曰時有刺痛者敗血也但寒熱無它證者陰陽不和也增損四物湯當歸洗去土並蘆須切焙芍藥洗銼人參去蘆切片川芎洗銼各一兩甘草四錢炙乾薑一兩宜用生薑代之上為末每服二錢匕水一盞生薑五片同煎六分去滓微熱服不以時候奪命丹見第二論又十八論云但服蒲黃黑神散自瘥第七論曰產後四肢虛腫者何答曰產後敗血乘虛停積於五臟循經流入於四肢留留日深卻還不得腐壞如水故令四肢面目浮腫醫人不識便作水氣治之血氣與水氣不同凡治水氣多用導水藥極虛之夫產後既虛又以藥虛之是謂重虛往往因致夭枉但服調經散血行腫消即愈調經散沒藥令研琥珀研各一錢桂去粗皮不見火銼芍藥赤者洗銼當歸去蘆須切各一錢細辛去葉銼麝香研各半錢上為末每服半錢匕生薑汁溫酒各少許調勻服之又十八論云但服蒲黃黑神散後服轉藥瀉下惡物自瘥轉藥是黑神丸在第十二論後第八論曰產後乍見鬼神者何答曰心主身之血脈因產傷耗血脈心氣則虛敗血停積上于于心心不受觸遂致心中煩燥臥起不安乍見鬼神言語顛倒醫工不識呼為風邪如此治之必不得愈但服調經散每服加生龍腦一捻得睡即安方見第七論又十八論云但服蒲黃黑神散自安第九論曰產後月內不語者何答曰人心有七孔三毛產後血虛氣弱多致停積敗血閉於心竅神志不能明瞭又心氣通於舌心氣閉塞則舌亦強矣故令不語如此但服七珍散即瘥七珍散人參去蘆切片石菖蒲節密者銼川芎洗銼焙熟乾地黃各一兩細辛一錢去葉防風去苗銼硃砂研各半兩上為末每服一錢蒲荷湯調下不以時候又十八論云但服蒲黃黑神散便安第十論曰產後腹痛又瀉痢者何答曰產後腸胃虛怯寒邪易侵若未滿月飲冷當風則寒邪乘虛進襲留於盲膜散於腹脅故腹痛作陣或如錐刀所刺流入大腸水穀不化洞泄腹鳴或下赤白腹脅䐜脹或走痛不定急服調中湯立愈若醫者以為積滯取之則禍不旋踵謹之謹之調中湯高良薑銼油炒當歸洗去蘆須切焙桂去皮不見火銼白芍藥洗銼附子炮去皮臍川芎洗各一兩甘草半兩炙銼上為粗末每服三錢用水三盞煎至一盞去滓熱服又十八論云急服蒲黃黑神散後服調中湯第十一論曰產後遍身疼痛者何答曰產後百節開放血脈流走遇氣弱則經絡肉分之間血多留滯累日不散則骨節不利筋脈引急故腰背不得轉側手腳不能動搖身熱頭痛若醫以為傷寒治之則汗出而筋脈動踢手足厥冷變生他病但服趁痛散以嘿除之趁痛散牛膝切酒浸一宿控干慢火炒焙乾當歸去蘆須先切焙白朮銼碎焙乾黃耆蜜炙銼桂去皮不見火銼獨活去蘆銼川中者尤佳生薑切各半兩薤白洗切銼甘草炙銼各一分上為粗末每服半兩水五盞煎至兩盞去滓熱服一盞次一盞續後再暖服不拘時候又十八論云但服蒲黃黑神散即愈第十二論曰產後大便秘澀者何答曰產臥水血俱下腸胃虛竭津液不足是以大便秘澀不通也若過五六日腹中悶脹者此有燥糞在臟腑以其乾澀未能出耳宜服麻仁丸以津潤之若誤以為有熱而投之以寒藥則陽消陰長變動百出性命危矣麻仁丸麻仁研碎枳殼去穰銼炒微黃人參去蘆切片大黃煨銼各半兩上為末煉蜜丸梧桐子大空心溫湯下二十丸未通加丸數又十八論云產後小便出血大便滯痛者何答曰敗血流入大小腸大小腸澀滯致小便澀寒大便艱難人多不識作五淋治之不愈但服蒲黃黑神散後服黑神丸取下惡物即安黑神丸巴豆去皮以水二碗煮盡為度去心膜細研去油黑附子炮去皮臍切片肉桂去皮不見火銼白乾薑炮銼各半兩上為末麵糊丸如蘿蔔子大每服三丸至五丸熱茶下再以熱茶投之即行前第七論中雲轉藥者即是此方切不可服尋常取積藥第十三論曰產後血崩者何答曰產臥傷耗經脈未得平復而勞役損動致血暴崩下淋瀝不止或因鹹酸不節傷蠹榮衛氣衰血弱亦變崩中若小腹滿痛肝經已壞為難治急服固經丸以止固經丸艾葉揀淨銼碎炒黃赤石脂補骨脂略炒香木賊去根節各半兩附子一枚炮去皮臍切片上為末陳米飲和丸桐子大食前溫酒下二十丸米飲亦得如陳米飲難丸即入雪糕少許搜和即易丸也又十八論云但服蒲黃黑神散及黑神丸立瘥第十四論云產後腹脹悶滿嘔吐不定者何答曰敗血散於脾胃脾受之不能運化精微而成腹脹胃受之則不得受納水穀而生吐逆醫者不識若以尋常治脹止吐藥療之病與藥不相干轉更傷動正氣疾愈難治但服巨勝湯必瘥巨勝湯赤芍藥洗銼半夏湯洗七次切碎澤蘭葉洗曬人參去蘆切片陳皮去白甘草炙銼各一錢生薑半兩上為粗末用水一碗同煎至二盞去滓微熱分三服又十八論云急服蒲黃黑神散次服黑神丸吐出惡物即安第十五論曰產後口鼻黑氣起及鼻衄者何答曰陽明者經脈之海起於鼻交額中還出挾口交人中左之右右之左產後氣消血散榮衛不理散亂入於諸經卻還不得故令口鼻黑起及變鼻衄此緣產後虛熱變生此疾其疾不可治名曰胃絕肺敗遇有此疾急取緋線一條併產婦頂心發兩條系兩中指上節即止無藥可療亦壓禳之一端也又十八論曰產後口鼻黑氣起者何答曰產後敗血入臟腑即滿衝於頭目卻還不得口乾舌焦鼻衄黑氣是產後熱變作此候不可治也名曰敗肺第十六論曰產後喉中氣急喘者何答曰榮者血也衛者氣也榮行脈中衛行脈外相隨上下謂之榮衛因產所下過多榮血暴竭衛氣無所主獨聚於肺中故令喘也此名孤陽絕陰為難治若惡露不快敗血停凝上熏於肺亦令喘急如此但服奪命丹血去喘息自止奪命丹方見第二論又十八論曰產後喉中氣急喘者何答曰產後敗血過於心轉於喉中此不可治也第十七論曰產後中風者何答曰產後五七日內強力下床或一月之內百日之中傷於房室或懷憂發怒擾蕩沖和或因灼艾傷動臟腑得病之初眼澀口噤肌肉瞤搐以漸腰脊筋急強直者不可治此乃人作非偶爾中風所得也第十八論曰產後心痛者何答曰心者血之主人有伏宿寒因產大虛寒搏於血血凝不得消散其氣逆上衝擊於心之絡脈故心痛但以大岩蜜湯治之寒去則血脈溫而經絡通心痛自止若誤以為有所傷療之則虛極寒益甚矣心絡寒甚傳心之正經則變為真心痛真心痛者朝發夕死夕發朝死藥不可輕用如些大岩蜜湯方熟乾地黃洗酒浸一宿焙銼用當歸洗去蘆須切焙吳茱萸揀去枝梗獨活洗蜀中者尤佳芍藥洗銼乾薑炮銼甘草炙銼桂去皮不見火銼小草遠志葉各一兩細辛半兩去葉勿用馬蹄香上為粗末每服半兩用水三大盞煎一盞去滓再入蜜一匙又同煎三兩沸微熱服食前第十九論曰產後熱悶氣上轉為腳氣者何答曰產臥血虛生熱復因春夏取涼過多地之蒸濕因足履之所以著而為腳氣之疾其狀熱悶掣瘲驚悸心煩嘔吐氣上皆其候也服小續命湯兩三劑必愈若醫者誤以逐敗血藥攻之則血去而疾益增劇小續命湯人參去蘆切片黃芩尖如錐者桂去粗皮不見火麻黃去節防己銼碎川芎洗銼芍藥洗甘草炙白朮銼各一兩附子一個去皮臍防風一兩半去苗生薑五兩洗去皮切上為粗散每服半兩用水三大盞煎至一盞去滓溫服第二十論產後汗出多而變痙風者何答曰產後血虛肉理不密故多汗因遇風邪搏之則變痙風也痙者口噤不開背強而直如發癇狀搖頭馬鳴身反折須臾十發氣息如絕宜速斡口灌小續命湯稍緩即汗出如雨手拭不及者不可治此方不特治產婦凡男女偶中此疾急以此藥灌之無不愈也或服它藥則不及矣第二十一論曰產後所下過多虛極生風者何答曰婦人以榮血為主因產血下太多氣無所主唇青肉冷汗出目瞑神昏命在須臾此但虛極生風也如此急服濟危上丹神良以風藥治之則誤矣濟危上丹乳香以竹葉盛又以竹葉覆上熨斗略熨過即研成末五靈脂不夾石者研硫黃研如粉太陰玄精石研陳皮去穰銼碎桑寄生銼阿膠銼碎用蛤粉炒泡起篩去蛤粉用卷柏生用各一兩上將上四味同研勻石器內微用火炒動勿令焦炒了再研極細後入余藥末用地黃汁打糊丸梧桐子大產後溫酒下二十丸當歸酒亦得又十八論曰產後血氣通肺上氣咳嗽多縱睡者何答曰產後滿月血脈未通好食熱面壅結成痰或有氣塊發時衝心心痛氣急咳嗽四肢寒熱心悶口乾背膊痠疼睡夢驚狂體虛無力時有汗出心痛月候不來名曰敗症腹痛繞臍面色微赤因此不療縱然得效三兩日又發急服黑神散立愈論臨月將息凡產婦合要備急湯藥並須預先修合題號恐臨時倉卒難致臨月忌勿多飲酒即依產圖方位擇深靜房室入月一日即用借地法於房內北壁熏令香潔論新生小兒凡新生小兒急以綿裹指頭拭兒口中惡物不爾流入腹中後生諸疾斷臍可長三寸臍中若有蟲急撥去恐入腹內繃了取生甘草寸余捶碎水一合煎濃汁以綿包子點兒口中當吐出惡汁盡半合無妨又取細研硃砂末一字許以熟蜜調置兒口中令嘔之去驚邪三日湯煎虎頭骨少許豬膽汁少許和湯浴兒少驚無瘡令無惡疾每日頻就無風明處看兒上齶若有一點白泡如竹膜起處速以指甲刮破更生更去之除灸臍帶外則勿加火艾恐成驚癇若有冷熱夜啼臍瘡不幹變蒸諸疾自別有方治之今錄廬江劉寶助教經效小兒名方四道注唇膏治初生孩兒眾疾療胎風病硃砂研細坯子胭脂各一錢白殭蠶七個炒去絲嘴中黃半錢研蠍梢半個上白殭蠶蠍梢用薄荷汁一合重湯煮汁盡為度焙乾為細末研入坯子硃砂等生蜜和為膏逐日與孩兒注唇令自嘔嚥取效豆蔻散治小兒夏月滑瀉冷痢不已腹痛瘦瘁食下即逆肉豆蔻一個用糊餅面一塊如杏大裹豆蔻灰火中煨不住攪轉候色赤透熱取出銼焙乾上為細末每服半大錢七八歲至十歲者一錢用溫米飲調下日三服一兩日間愈蠍梢散治小兒胎風及百晬孩兒臍風攝口無能救療者先用生腦子一字填入臍心上用艾炷灸一七壯如不覺灸二七壯再添腦子大妙候定服蠍梢散蠍梢四十九個用薄荷葉逐個卷以絲扎定於砂銚中滾轉炒令薄荷干蘇為度白殭蠶四十九個生薑汁浸炒乾去嘴上二味為末入生腦子抄半錢麝香少許研勻用紫色雄雞肝煎湯調下末半錢許並三兩服愈治小兒諸般齁喘疾烏雞卵一個輕粉少許上將雞卵於尖小一頭打小穴子入輕粉在內用杖子攪轉令勻坐雞卵於飯上蒸熟訖將與患者小兒吃只一枚取效累用經效方隆興府學論張世臣方大聖澤蘭散治婦人血海虛冷久無子息及產後敗血衝心中風口噤子死腹中擘開口灌藥須臾生下便得無恙並治胎墮腹中攻刺疼痛橫生逆產胎衣不下血運血癖血滯血崩血入四肢應血臟有患及諸種風氣或傷寒吐逆咳嗽寒熱往來遍身生瘡頭痛噁心經脈不調赤白帶下乳生惡氣胎臟虛冷數曾墮胎崩中不止因此成疾及室女經脈不通並宜服之常服暖子宮和血氣悅顏色退風冷消除萬病兼療五勞七傷虛損等病澤蘭葉去根曬乾石膏研各二兩生乾地黃一兩半銼用溫湯浴過浪干焙用桂肉一兩一分銼不見火用吳茱萸湯洗七次炒厚朴去粗皮銼碎用薑製一宿炒乾白茯苓去皮銼焙卷柏去根銼細辛去苗並葉焙柏子仁揀去殼別研細防風去苗銼桔梗去蘆銼焙白蕪荑各一兩白朮切片焙白芷去稍銼丹參洗銼焙乾薑炮烈銼焙五味子去枝梗銼藁本去蘆頭洗人參去蘆頭切川烏頭炮去皮臍川椒去目及閉口者微炒出汗黃耆銼去蘆頭各三分阿膠銼碎蛤粉炒泡起去粉用白薇銼焙各半兩當歸去蘆須洗切片子焙乾白芍藥銼甘草炙銼川芎各一兩三分上為細末每服二錢空心臨臥熱酒調下若急疾有患不拘時候奪命褐散子妊娠四五月以上忽然仆地手足抽掣咽中涎聲滾滾口眼不開如小兒瘛瘲之狀名曰胎癇甜葶藶紙上微炒芫花醋煮乾焙燥各半兩郁李仁湯浸去皮地榆銼各一分上為細末每服一字煎沉香人參鉤藤鉤子防風湯調下如牙噤者用物斡開灌下調藥汁不過一匙不拘時候沉香但磨藥汁尤妙如醒時只用防風煎湯調四君子湯服蘇合香丸及大聖澤蘭散半月餘其病脫然恐目昏不能視物不必疑慮氣血凝靜自然光明謹勿服眼藥有三四婦人皆患此證寸口脈伏自關而下脈弦蓋伏者氣不上升弦者有飲在內此必因胎肥流飲不化注入胎宮與血相搏子不安靜故氣不上升乃胎觸心絡遂有胎癇之證先是醫者用安胎養血之藥未效遂以此藥緣此證雖是產前之疾卻當作產後治療乃是血不循經氣不升降氣閉血壅其狀如癇當導氣而遂其飲氣通飲消則血循經入養胎安氣則子安靜矣累用經驗地榆降血飲子治妊娠入月臨產之時血出三日而子未下手足不收昏瞀如醉不省人事此乃漏血過多血不養胎心氣逆上胎氣留連此名胎干此藥治之神效甚速蘇子降氣湯一幟乃八味者是只作一服加地榆一錢半洗淨麥門冬十粒去心水一盞半生薑二片煎七分去滓入乳香少許透明者鎔開溫服不能自飲者扶起灌之大安胎飲子治妊娠胎氣不安腹脅刺痛經脈適來氣急上喘等疾當歸洗去蘆須切片焙乾乾地黃銼洗浪干再焙用川芎洗銼赤芍藥銼地榆銼各一兩阿膠銼碎蛤粉炒泡起去粉用熟艾各半兩黃芩一分銼上為粗末分作十五服每服水二盞煎至六分去滓通口服不拘時候吳白朮散安胎養氣常服十月中胎氣安定無諸疾苦白朮去蘆切片子焙人參去蘆切片子焙白茯苓去黑皮銼焙甘草炙銼阿膠銼碎蛤粉炒泡起去粉用已上各等分上為㕮咀每服三大錢水一阿半煎至七分去滓溫服不拘時候滑胎榆白皮為細末每服一錢空心白湯調下自入月每日三服令易產兒生下藥皆塗身上催生並死胎不下蓽麻子三個巴豆四個研細入麝香少許貼臍心上須臾間便下難產三兩日不生以蠶種紙半張燒灰熟水調下系已出蠶種紙亦名歹明脫治橫生逆生灸產婦右腳小指尖頭如麥大三壯立產又方蛇退皮燒灰酒調二錢面東服又方鹽塗兒足底急去之又方車前子末酒服二錢妊娠煩悶胎熱睡臥不得並腹中痛又難產知母新白者焙乾為末煉蜜丸如小彈子大每服一丸溫酒化下妊娠偶因所觸或墜高傷折致胎動不安腹中痛不可忍者縮砂不以多少和皮炒令熱透去皮為細末每服二錢熱酒調下胎即安神效胎動日夜叫呼口噤唇青及下痢不止者熟艾一兩酒五盞煮四盞去滓再煎至二盞服口閉者灌之亦治腰痛下血胎動及下血心腹脹者當歸二兩川芎一兩為粗末水四盞酒五盞煎至三盞分三服若胎未死即安已死即便下產後血暈五靈脂炒令煙盡為細末溫酒調下一錢童子小便尤佳又方乾荷葉為細末每服一錢溫酒調下又方生半夏為末一大豆許吹鼻中又方紅花或蘇枋木酒水濃煮汁飲產後中風眼上視四肢搐搦荊芥穗為末每服二錢溫酒調下如不飲酒只濃煎湯服產後發狂每用大香附去須皮淨為細末每用二錢入研極細好辰砂末一錢以燒通紅秤捶浸好酒調服產前傷寒不問陰陽身熱頭痛白朮二錢黃芥一錢粗末水一盞煎六分去滓熱服不計時候
