body:
  text: 卷第二孫真人養胎論論曰舊說凡受胎三月逐物變化稟質未定故妊娠三月欲得觀犀象猛獸珠玉寶物欲得見賢人君子盛德大師觀禮樂鐘鼓俎豆軍旅陳設焚燒名香口誦詩書古今箴誡居處簡靜割不正不食席不正不坐彈琴瑟調心神和情性節嗜欲庶使清淨生子皆良長壽忠孝仁義聰惠無疾斯蓋文王胎教者也論曰兒在胎日月未滿陰陽未備臟腑骨節皆未成足故自初訖於將產飲食居處皆有禁忌妊娠食羊肝令子多厄妊娠食山羊肉令子多病妊娠食驢馬肉延日妊娠食騾肉產難妊娠食兔肉犬肉令子無音聲並缺唇妊娠食雞子及干鯉魚令子多瘡妊娠食雞肉糯米令子多寸白蟲妊娠食堪並鴨子令子倒出心寒妊娠食雀肉並豆醬令子滿面多黑子妊娠食雀肉飲酒令子心經情亂不畏羞恥妊娠食鱉令子項短娠娠食冰漿絕胎妊娠勿向非常地大小便必半產殺人徐之才逐月養胎方妊娠一月名始胚飲食精熟酸美受御宜食大麥無食腥辛是謂才正妊娠一月足厥陰脈養不可針灸其經足厥陰內屬於肝肝主筋皮及血一月之時血行痞澀不為力事寢必安靜無令恐畏妊娠一月陰陽新合為胎寒多為痛熱多卒驚舉重腰痛腹滿胞急卒有所下當預安之宜服烏雌雞湯烏雌雞湯烏雌雞一隻治如食法茯苓去黑皮阿膠銼碎各二兩芍藥白者白朮去蘆人參去蘆各三兩甘草炙銼生薑洗去皮切各一兩吳茱萸一升揀去枝梗麥門冬五合湯泡去心曬焙乾上十味㕮咀以水一斗二升煮雞取汁六升去雞下藥煎取三升納酒三升並膠烊盡取三升放溫每服一升日三次服若曾傷一月胎者當預服補胎湯補胎湯細辛一兩高麗者去葉生薑四兩洗擦去皮切碎烏梅一升捶碎防風三兩去蘆乾地黃洗曬銼焙乾白朮去蘆各三兩大麥炒吳茱萸揀淨各五合上八味㕮咀以水七升煮取二升半分三服食前服寒多者倍細辛茱萸若熱多渴者去細辛茱萸加栝蔞根二兩若有所思去大麥加柏子仁三合一方有人參一兩妊娠二月名始膏無食辛燥居必靜處男子勿勞百節皆痛是為胎始結妊娠二月足少陽脈養不可針灸其經足少陽內屬於膽主精二月之時兒精成於胞里當謹護驚動也妊娠二月始陰陽踞經有寒多壞不成有熱即萎卒中風寒有所動搖心滿臍下懸急腰背強痛卒有所下乍寒乍熱艾葉湯主之艾葉湯艾葉去梗丹參洗當歸洗去蘆須切片焙麻黃不去節各二兩人參去蘆頭切阿膠銼碎各三兩甘草一兩炙生薑六兩洗擦去皮切大棗十二枚去核上九味㕮咀以酒三升水一斗煮減半去滓納膠煎取三升分三服一方用烏雌雞一隻宿肥者治如食法割頭取血納三升酒中相和雞以水一斗二升先煮取汁去雞納藥煎取三升納血酒並膠煎取三升分作三服若曾傷二月胎者當預服黃連湯黃連湯黃連去須人參去蘆切各一兩吳茱萸五合揀淨生薑三兩洗擦去皮切生地黃五兩一方用阿膠上五味㕮咀以酢漿七升煮取三升分四服日三夜一十日一作若頗覺不安加烏梅一升加烏梅者不用漿只用水耳一方用當歸半兩妊娠三月名始胞當此之時未有定義見物而化欲生男者操弓矢欲生女者弄珠璣欲子美好數視壁玉欲子賢良端坐清虛是謂外象而內感者也妊娠三月手心主脈養不可針灸其經手心主內屬於心無悲哀思慮驚動妊娠三月為定形有寒大便青有熱小便難不赤即黃卒驚恐憂愁嗔怒喜頓僕動於經脈腹滿繞臍苦痛或腰背卒有所下雄雞湯雄雞湯雄雞一隻治如食法甘草炙銼人參去蘆切片茯苓雪白者去皮阿膠銼碎各二兩黃芩尖如錐者白朮去蘆各一兩麥門冬五合湯浸去心曬焙乾芍藥四兩洗大棗十二枚去核生薑一兩洗擦去皮上十一味㕮阻以水一斗五升煮雞減半出雞納藥煮取半納清酒三升並膠煎取三升分三服一日盡之當溫臥一方用當歸芎各二兩不用黃芩生薑若曾傷三月胎者當預服茯神湯茯神湯茯神去木丹參洗龍骨五色緊者各一兩阿膠碎蛤粉炒泡起去粉用當歸洗去蘆須切焙甘草炙銼人參去蘆頭各二兩赤小豆二十一粒大棗二十一枚去核上九味㕮咀以酢漿一斗煮取三升分四服先食服七日後服一劑腰痛者加桑寄生二兩深師有韭白二兩麻子一升妊娠四月始受水精以成血脈食宜稻粳羹宜魚雁是謂盛血氣以通耳目而行經絡妊娠四月手少陽脈養不可針灸其經手少陽內輸三焦四月之時兒六腑順成當靜形體和心志節飲食妊娠四月有寒心下慍慍欲嘔胸膈滿不欲食有熱小便難數數如淋狀臍下苦急卒風寒頸項強痛寒熱或驚動身軀腰背腹痛往來有時胎上迫胸心煩不得安卒有所下菊花湯菊花湯菊花一握如雞子大麥門冬一升湯浸去心焙乾麻黃不去節阿膠銼碎各三兩甘草炙銼當歸洗去蘆須切焙各二兩人參一兩半去蘆頭切生薑五兩洗擦去皮切碎半夏四兩湯浸七次姜淹一宿大棗十二枚去核上十味㕮咀以水八升煮減半納清酒三升並阿膠煎取三升分三服溫臥當汗以粉粉之護風寒四五日一方用烏雌雞一隻煮水煎藥若曾傷四月胎者當預服調中湯調中湯續斷去根洗焙乾芎藭洗銼甘草炙各一兩白朮去蘆切焙柴胡去蘆洗厚朴削去皮生薑搗碎淹一宿次日焙乾枳實去穰麩炒生李根白皮洗各三兩白芍藥雪白者銼生薑洗去皮切各四兩當歸一兩半洗去蘆須烏梅一升捶碎上十二味㕮咀以水一斗煮取三升分四服日三夜一八日後復服一劑妊娠五月始受火精以成其氣臥必晏起沐浴浣衣深其居處厚其衣裳朝吸天光以避寒殃其食稻麥其羹牛羊和以茱萸調以五味是謂養氣以定五臟妊娠五月足太陰脈養不可針灸其經足太陰內輸於脾五月之時兒四肢皆成無大飢無甚飽無食乾燥無自炙熱無大勞倦妊娠五月有熱苦頭眩心亂嘔吐有寒苦腹滿痛小便數卒有恐怖四肢疼痛寒熱胎動無常處腹痛悶頓欲僕卒有所下阿膠湯主之阿膠湯旋覆花二合去枝根阿膠四兩銼碎人參一兩去蘆頭切麥門冬一升湯浸去心焙生薑六兩洗擦去皮切吳茱萸七合揀淨湯洗三次焙黃芩尖如錐者當歸洗去蘆須切片子焙芍藥雪白者銼甘草炙各二兩上十味㕮咀以水九升煮藥減半內清酒三升並膠微火煎取三升半分四服日三夜一先食服便愈不瘥再服一方用烏雌雞一隻割取咽血納酒中以水煮雞以煎藥減半納酒並膠煎取三升半分四服曾傷五月胎者當預服安中湯安中湯黃芩一兩尖如錐者當歸洗去蘆須切片焙芎藭洗銼人參去蘆頭切乾地黃洗淨焙乾各二兩甘草炙銼芍藥雪白者各三兩生薑六兩洗擦去皮切碎麥門冬一阿湯泡去心焙大麻仁五合去殼五味子五合揀去枝梗大棗三十五枚去核上十二味㕮咀以水七升清酒五升煮取三升半分四服日三夜一七日復服一劑妊娠六月始受金精以成其筋身欲微勞無得靜處出遊於野數觀走犬及視走馬食宜鷙鳥猛獸之肉是謂變腠理紉筋以養其力以堅背膂妊娠六月足陽明脈養不可針灸其經足陽明內屬於胃主其口目六月之時兒口目皆成調五味食甘美無大飽妊娠六月卒有所動不安寒熱往來腹內脹滿身體腫驚怖忽有所下腹痛如欲產手足煩疼宜服麥門冬湯麥門冬湯麥門冬一升湯浸去心人參去蘆切片甘草炙銼黃芩各二兩乾地黃三兩洗焙阿膠四兩銼碎生薑六兩洗擦去皮大棗十五枚去核上八味㕮咀以水七升煮減半納清酒二升並膠煎取三升分三服中間進糜粥一方用烏雌雞一隻煮水以煎藥若曾傷六月胎者當預服柴胡湯柴胡湯柴胡四兩去蘆洗焙芍藥雪白者一方作柴箴白朮去蘆切焙乾甘草炙各二兩蓯蓉一兩酒浸一宿切碎焙麥門冬湯浸去心焙芎藭洗各二兩乾地黃五兩洗淨焙生薑六兩洗擦去皮切片大棗三十枚去核上十味㕮咀以水一斗煮取三升分四服日三夜一中間進糜粥勿食生冷及堅硬之物七日更服一劑妊娠七月始受木精以成其骨勞身搖肢無使定止動作屈伸以運血氣居處必燥飲食避寒常食稻粳以密腠理是謂養骨而堅齒妊娠七月手太陰脈養不可針灸其經手太陰內屬於肺主皮毛七月之時兒皮毛已成無大言無號哭無薄衣無洗浴無寒飲妊娠七月忽驚恐搖動腹痛卒有所下手足厥冷脈若傷寒煩熱腹滿短氣常苦頸項及腰背強蔥白湯主之蔥白湯蔥白十四莖長三四寸麥門冬一升湯浸去心焙生薑八兩洗擦去皮切片甘草炙銼當歸洗去蘆須切片子焙黃耆捶褊蜜塗炙各三兩人參一兩半去蘆切片阿膠四兩銼碎黃芩一兩尖如錐者旋覆花一合去枝梗半夏一升湯泡洗七次用生薑制一宿焙乾上十一味㕮咀以水八升煮減半納清酒三升及膠煎取四升服一升日三夜一溫臥當汗出若不出者加麻黃去節二兩煮服如前法若秋後勿強漬汗一方以黃雌雞一隻割咽取血納酒中煮雞取汁以煎藥若曾傷七月胎者當預服杏仁湯杏仁湯杏仁湯浸去皮尖甘草炙各二兩麥門冬湯浸去心焙吳茱萸揀淨湯洗三二次焙各一升鍾乳使煉成者粉尤勝生鍾乳乾薑炮烈各二兩粳米五合紫菀一兩使茸五味子三合去梗上九味㕮咀以水八升煮取三升半分四服日三夜一中間進食七日服一劑一方用白雞一隻煮汁煎藥妊娠八月始受土精以成膚革和心靜氣無使氣極是謂密腠理而光澤顏色妊娠八月手陽明脈養不可針灸其經手陽明內屬於大腸主九竅八月之時兒九竅皆成無食燥熱無輒失食無忍大起妊娠八月中風寒有所犯觸身體盡痛乍寒乍熱胎動不安常苦頭眩痛繞臍下寒時時小便白如米汁或青或黃或使寒慄腰背苦冷而痛目䀮䀮芍藥湯主之芍藥湯芍藥白者銼生薑洗淨去皮各四兩甘草炙銼當歸去蘆須洗切片子焙白朮去蘆焙人參去蘆切片各三兩薤白一升切洗厚朴三兩去皮生薑搗碎淹一宿焙上八味㕮咀以水五升清酒四升合煮取三升分三服日再夜一一方用烏雌雞煮汁以煎藥若曾傷八月胎者當預服葵子湯葵子湯葵子三升揀洗淨生薑六兩洗淨擦去皮切片芍藥四兩雪白者銼白朮去蘆切焙乾柴胡去蘆洗焙各三兩大棗二十枚去核甘草二兩炙銼厚朴二兩去皮生薑搗碎淹一宿焙上八味㕮咀以水九升煮取三升分三服日三十日一劑一方用烏雌雞一隻煮水以煎藥妊娠九月始受石精以成皮毛六腑百節莫不畢備飲醴食甘緩帶自持而待之是謂養毛髮致才力妊娠九月足少陰脈養不可針灸其經足少陰內屬於腎腎主續縷九月之時兒脈續縷皆成無處濕冷無著炙衣妊娠九月若卒得下痢腹滿懸急胎上衝心腰背痛不可轉側短氣半夏湯半夏湯半夏湯泡七次以生薑二兩淹一宿麥門冬湯浸去心焙各五兩當歸去蘆須切片子焙吳茱萸揀淨湯泡洗三二次焙阿膠用蛤粉炒各三兩乾薑一兩炮烈大棗十二枚去核上七味㕮咀以水九升煮取三升去滓納白蜜八合微火上溫分四服痢即止一方用烏雌雞一隻煮汁煎藥若曾傷九月胎者當預服豬石湯豬石湯豬石一具剝去筋膜洗淨白朮四兩去蘆切焙茯苓去黑皮桑寄生揀淨乾薑炮烈乾地黃洗淨焙芎藭洗焙各三兩麥門冬一升湯浸去心焙大豆三合略炒附子一枚中者炮烈去皮臍切上十味㕮咀以水一斗煮石令熟去石納諸藥煎取三升半分四服日三夜一十日更一劑妊娠十月五臟俱備六腑齊通納天地氣于丹田故使關節入神皆備但俟時而生妊娠一月始胚二月始膏三月始胞四月形體成五月能動六月筋骨立七月毛髮生八月臟腑具九月穀氣入胃十月諸神備日滿即產矣宜服滑胎藥入月即服養胎臨月服令滑易產丹參膏丹參膏丹參半斤洗曬芎藭洗焙當歸洗去蘆須切焙各二兩蜀椒五合炒少時以碗合定出汗若有熱者以大麻入五合代上四味㕮咀以清酒溲濕停一宿以成煎豬膏四升微火煎膏色赤如血膏成新布絞去滓每日取如棗許納酒中服之不可過服至臨月乃可服舊用常驗甘草散令易生母無疾病未生一月日預服過三十日行步動作如故兒生墮地皆不自覺甘草二兩炙銼大豆黃卷微炒乾薑炮烈撕碎黃芩尖如錐者桂心不見火銼大麥糵炒一方用粳米吳茱萸揀去梗湯洗三次焙麻子仁各三兩上八味為細末每服二錢酒調服日三服白湯調下亦得千金丸主養胎及產難顛倒胞不出服一丸傷毀不下產余病汗不出煩滿不止氣逆滿以酒服一九良一名保生丸甘草炙銼貝母去心秦椒炒出汗乾薑炮烈撕碎桂心去皮不見火黃芩尖如錐者石斛去根銼石膏硬者不煅軟者火煅粳米大豆黃卷炒各六銖當歸十二銖洗去蘆須切片子焙麻子三合上十二味為末煉蜜和丸如彈子大每服一丸日三服用棗湯化下一方用蒲黃一兩蒸大黃丸治妊娠養胎令易產大黃三十銖蒸銼枳實銼去穰麩炒芎藭洗銼焙白朮去蘆切焙乾杏仁湯泡去皮各十八銖芍藥白者銼厚朴削去皮生薑搗碎淹一宿乾薑炮烈各十二銖吳茱萸一兩揀去梗湯泡洗三二次焙上九味為末煉蜜丸如梧桐子大空腹酒下二十丸日三服未效加丸數滑胎令易產方車前子一升水淘洗令淨控焙乾隔紙炒阿膠八兩銼碎蛤粉炒泡起去粉用滑石三兩上三味為細末飲湯調服一錢日再服如生月可服之藥利九竅未產不得先服
