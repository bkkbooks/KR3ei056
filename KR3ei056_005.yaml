body:
  text: 卷第五産科雜方催生如聖散此一方廬江劉寶助教經效名方黃蜀葵花不拘多少上一味焙乾為細末每服二錢熱湯放溫調下神妙或有漏血胎臟乾澀難産痛劇者並進三服良久腹中氣寬胎漏即時産下如無花只用黃蜀葵子爛研小半合以酒調濾去滓溫飲尤佳救生散安胎益氣易産人參去蘆切片訶子濕紙裹煨熟去核白朮銼炒黃陳橘皮去白炒大麥柏炒黃神麯細銼炒黃色各半兩上為細末每服二錢水一盞煎六分溫服入月加一倍用水二盞煎至一盞溫溫空心服之能令兒緊下乳母無患罩胎散治婦人妊娠傷寒遍身大熱悶亂躁渴痰甚則蒸損胎臟廬江劉寶助教名方卷荷葉一兩嫩者焙乾稱蚌粉花半兩好細白者稱上為細末入粉研勻每服二錢以新汲水用蜜調下日進兩服二聖散産前安胎産後治惡血不盡及胎衣不下羌活洗去苗銼川芎洗銼上等分為細末每服二大錢酒少許水七分煎七沸溫服羌活散治妊娠患時疾羌活去苗銼碎荊芥穗不見火曬赤茯苓去皮銼碎川芎洗銼焙宣州乾葛銼焙陳皮去穰銼甘草炙銼川升麻銼各一兩上為細末每服三錢水一盞半入生薑五片薄荷十葉同煎至一盞稍熱服不以時候黃金散治妊娠患時疾黃芩尖如錐者鬱金銼各一兩上為末每服一錢板蘭根地黃水調下汗出效未得汗再服即瘥又用雞卵墜井至泥隔宿取出吞之必無虞矣姜粉散才産服此藥蕩盡兒枕除百病源當歸洗去蘆須切焙官桂去皮不見火者人參去蘆切片茯苓白者去黑皮甘草炙芍藥洗淨知母潤者切炒川芎洗大黃略炒黃耆蜜炙木香不見火草豆蔻去殼白朮銼碎訶子煨熟去核高良薑銼炒青橘皮去穰熟乾地黃洗酒浸焙上除地黃外各等分銼焙乾次用附子一個結實半兩者炮裂去皮臍切生薑一斤研取自然汁於碗器中停留一食久傾去清汁取下面粉腳攤在蒻葉中入焙寵焙乾同衆藥搗羅為末才産後用藥末三錢水一盞姜三片棗子一個擘開同煎至七分乘熱吃如吃藥之後自然産母睡著半日以來睡覺再服全除卻腹痛一日只可三服至九服不可服恐肚中冷也香蓮散治産後咳逆石蓮十個炒熟丁香十個上為末用水三合煎十沸溫服地黃散治産後血痛如刀刺熟乾地黃洗酒浸焙橘皮去白銼焙上件等分為末每服一錢粥飲調下尋常痛發可常服香脂散治産後吐逆不止十八論中治産前後患蒲黃黑神散功效第一産因熱疾胎死腹中胎死身即冷口角沫出爪甲青黑色四肢逆冷但服此藥暖其死胎須臾自出第二難産或橫生逆生胎衣不下此藥並治第三産後衣不下但服此藥遂出衣中血遂自出如衣帶斷亦同第四血暈醫人不識呼為暗風但服此藥立瘥第五口乾心悶醫人呼為胸膈不利此名血結但服此藥立瘥第六乍寒乍熱醫人不識呼為瘧疾但服此藥立瘥第七産後四肢虛腫醫人不識呼為水氣蓋血氣隔四肢寒但先服此藥立瘥後服轉藥瀉了惡物轉藥謂之黑神丸第八産後乍見神鬼醫人不識呼為風邪但服此藥即瘥第九産後月內不語但服此藥即瘥第十産後腹痛兼瀉痢急服此藥後服調中湯調中湯是止瀉石灰散出産乳經中第十一産後遍身疼痛但服此藥瘥第十二産後小便出血大便祕澀人多作五淋治不愈但服此藥瘥第十三産後血崩謂惡露未盡久不治之及食鹹酸所致若腹似痛時稍難治肝家熱背筋急急服此藥後服黑神丸瘥第十四産後血氣不通上氣喘嗽多睡謂滿月後月脈未通食熱面壅結成疾或有氣塊發時衝心心痛氣急咳嗽四肢無力乍汗出心痛月候不來名曰敗症腹痛繞臍面赤宜服此藥即瘥第十五産後心腹脹滿嘔逆不定醫呼為反胃不愈急服此藥吐出胃中惡物即瘥第十六産後口鼻黑色氣起及鼻衄不治第十七産後喉中氣急喘不治第十八産後中風為無故下床百日之內傷房室或因著灸有驚臟腑中風之時眼澀腰背筋急角弓反張牙關閉定不可治也蒲黃黑神散方已見第一論末黑神丸方已見第十二論末産前後十八論烏金散婦人萬病皆因血氣而生就中産後乖違誠難救療百日之內變證尤多或坐即運絶臥即口乾經日多言還應心悶或傷熱食變作崩中飲冷服涼便成腰痛敗血入腹則脅脹虛鳴惡露上衝乃或嘔逆脾之受血發則傷寒肝氣有邪即多嗔怒肺之被撓氣悶喘粗胃臟未安多為腹脹敗血流走百節痠疼留滯四肢皮膚俱腫失音不語還因敗血入心散為淋瀝亦是血之入腹大抵虛弱積血所為三焦不調衆疾皆起每尋方卷多不會解就中産前産後之圖難全真訣當貧困之輩或居村中念其急難方當思慮魂勞神悶不知所裁忽見一人形兒非常乃言曰余有祕術子其知乎不覺惕然瞻敬之際復曰子請存於誠信心欲救人事當甚喜吾有産後一術名曰烏金方受於子宜保惜之余即跪受要旨頓覺精神爽易事理照覺在寤中神受乃依方修合普諧神願遂成産後十八方如後第一論問胎死腹中者何答曰緣母患染熱疾經六七日間臟腑極熱蒸熏其胎是以子死何以知之身死便冷不居子宮乃墜臍下冷痛口角沫出腹冷爪甲青四肢逆冷命在須臾但以此三服令胎熱須臾自下第二論問産難者何答曰兒已成形每食母之血候十月當足月血有餘乃結成塊俗呼為兒枕子欲生時兒枕先破為敗血散裹子身上固當難産但服此散三服敗血即散須臾自産或逆産其體不同悉皆治之第三論問胎衣不下者何答曰産訖敗血流入胞衣中被血脹固當難下但服此散衣中血散須臾自出若胞衣帶斷亦宜服此散即下第四論問血暈産後三日起止不得眼前自見鬼神或悶絶不識人者何答曰産後三日血氣未安運走五臟奔於肺上時人不識呼為暗風以此治之萬無一瘥但服此藥立可安痊第五論問口於心悶及煩渴者何答曰産後七日以來血氣未定蓋為食於熱面與血結在心即渴時人呼為胸膈壅悶若以此治萬無一痊自服此散立瘥第六論問産後乍寒乍熱及渴者何答曰産後虛羸敗血入於肺則熱入於脾則寒乃渴時人不識呼為瘧疾若以此治萬無一痊服此散立瘥第七論問産後四肢浮腫及寒熱者何答曰敗血流入五臟將滿即四肢停留日久卻還不得乃欲為腫時人不識呼為水腫且如水腫與血腫不同何以明之水氣喘而小便澀血氣渴而四肢寒先服此散次服宣元瀉下惡物自瘥宣元是黑神丸第八論問言語顛狂無度若見鬼神或寒熱及渴者何答曰産後敗血衝心心不受邪觸被敗血蒸熏心悶蒸熱煩渴至躁言語顛狂時人不識以為風及神邪所致若以此治之萬無一痊但服此散愈第九論問産後不語者何答曰夫人心有七孔三毛産後敗血上行流入心孔之中被血閉之即使不語時人不先去心孔敗血其病不除但服此藥當漸語也第十論問産後腹痛及痢者何答曰産後未滿月間誤飲冷水水與血相和流入大腸大腸受之血遂成病水穀不化或泄或脹膿血不定急服此散次服調中湯立效第十一論問産後遍身疼痛者何答曰産後百節開張敗血流入四肢留滯日久不散結聚虛脹是致疼痛但服此散遂去百節間敗血須臾自定第十二論問産後瘀血及小便赤澀大便痛者何答曰敗血流入小腸閉郤水道即小便艱澀流入大腸閉郤肛門是致大小便俱難醫人不識呼為五淋治之萬無一痊但服此散次服黑神丸聚結物出其病立愈或用洪氏方中排濃內補散依方服立效第十三論問産後崩中者何答曰敗血惡露未止日久或食鹹酸之物遂變崩中血結變黑狀似雞肝或時寒熱背膊拘急煩悶名曰崩中宜先服此散次服黑神丸即安第十四論問産後血氣不調道路閉塞兼咳嗽多驚者何答曰産後滿月後月經未還不能謹忌好食熱面遂即成疾積聚結塊發即氣急咳嗽四肢寒熱心悶口乾背膊拘急煩躁夜夢驚悸體全無力多汗心痛月經不來名為血症腹痛多睡面色多赤因茲不療遂成骨蒸治須仔細看此疾狀或服別藥十無一應終不得瘥只服此藥其患自退第十五論問腹肚脹滿吐逆者何答曰産後敗血停於脾胃之間氣遂相沖不定即留滯嘔逆胸脅俱脹時人不識呼為反胃以此治之萬無一存急服此藥吐出胃中惡物即便吃粥第十六論問産後口鼻黑色及鼻衄者何答曰敗血傳入臟腑臟腑即滿衝於頭面卻還不得焦乾白黑見於面色衝於鼻即鼻衄黑起緣産後虛熱甚變成此狀若別治之萬不得一此名心肺敗血宜服此藥第十七論問産後喘急喉中如貓兒聲者何答曰敗血衝入心肺氣與血並遂結為塊入於喉中如有此狀急服此藥第十八論問産後中風兼有黑血點者何答曰産後七日內下床衝風百日內傷房勞或有灸瘡中風取性慢易即中風也初中之狀氣澀腰痛筋急如角弓反張牙關急若有此狀即是風邪所入或面色黑遍身赤黑敗血流入臟腑臟腑皆滿流入皮膚退反不得變成血點或得此變急服此藥無有不瘥宣經丸巴豆十五粒去皮心膜用生絹袋子盛以灰汁煮十餘沸取出研紙壓油了重研上件先用烏金散三錢以無灰酒調似糖入瓷瓶中於重湯內熬成膏入巴豆末同和為丸如緑豆大熟水下十五丸宜冷粥補之忌毒物烏金散頭髮灰男子者不須洗燒灰鯉魚鱗燒灰當歸焙去蘆須延胡索生用好墨煅過肉桂不見火去粗皮麒麟竭赤芍藥銼百草霜是鍋底刮下者煤上件九味等分杵羅為末每服二錢溫酒調下又用童子小便半盞生薑一塊同煎調下入麝香少許更妙産前所忌藥物廬醫周鼎集以為歌蚖斑水蛭地膽蟲烏頭附子配天雄躑躅野葛螻蛄類烏喙側子及虻蟲牛黃水銀並巴豆大戟蛇退共蜈蚣牛膝黎蘆加薏苡金石錫粉對雌雄牙朴芒硝牡丹桂蜥蠍飛生更䗪蟲代赭蚱蟬胡粉麝芫花薇銜草三稜槐子牽牛並皂角桃子蠐螬和茅根檔根硇砂與乾漆亭長溲疏茅草中瞿麥䕡茹蟹爪甲蝟皮鬼箭赤頭紅馬刀石蠶衣魚等半夏天南通草同乾薑蒜雞及鴨子驢馬兔肉不須供切忌婦人産前用此歌宜記在心胸
