body:
  text: 卷第三免乳大故方書浩博自非素習誰能適從危殆之間頗艱應用今採托諸方論中將護要法及預備經效要用湯藥名曰産科備要務從簡易以救倉卒論初妊娠凡女人妊娠若素來虛羸血氣不足體中有風氣心下多痰水者欲有胎喜病阻其狀顏色如常脈理和順但覺肢體沉重頭目昏眩不思飲食惡聞食氣多啖鹹酸心中憤悶不知患之所在以至三四月以後則大劇吐逆不能勝舉如有此證則宜服療阻病竹茹湯人參散地黃丸竹茹湯治初有妊擇食嘔逆頭痛顛倒寒熱四肢不和煩悶橘皮去白洗人參去蘆切片白朮切碎焙麥門冬去心各一兩厚朴去皮以善汁浸炙茯苓去黑皮各半兩甘草一分炙銼淡竹茹先刮下臨煎旋入上為粗末每服四錢水一盞半入生薑淡竹茹各一塊如栗子大拍破煎取八分去滓微溫服人參散治初妊娠惡食嘔逆人參一兩去蘆切片枳殼三分去穰撕碎麩炒微黃厚朴削去皮薑汗塗炙甘草炙各半兩上為粗散每服四錢水一盞半入生薑彈子大一塊拍破同煎至七分去滓溫服不拘時候地黃丸治初懷妊醋心嘔吐腹痛不能食或吐清水人參去蘆切片乾薑炮銼各一兩上為末用地黃汁和丸如桐子大每服五丸米飲下日再服又妊娠臟氣皆擁關節不利切不宜多睡食黏硬難化之物亦不須亂服湯藥大忌針灸惟須數行步定心神不得悲憂驚恐負重震動若覺胎臟不安腹中微痛心意煩悶四體昏倦宜服安胎順氣阿膠散近難月即服順胎保安散千金丸阿膠散治妊娠不問月數深淺因頓僕胎動不安腰腹痛或有所下或胎奔上刺心短氣安胎熟乾地黃二兩洗細切酒浸焙艾葉切炒黃當歸洗切焙去蘆須甘草炙銼芍藥洗銼阿膠銼碎以蚌粉拌和銚內炒泡起候冷篩去蚌粉用芎洗銼各一兩黃耆一兩若虛羸加此一味蜜炙上為粗散每服四錢水一盞半煎至八分去滓溫服若胸中冷氣逆加生薑五升棗五枚同煎保安散治妊娠胎氣不安心腹疼痛胎動安胎極妙當歸一兩半洗切焙去蘆須人參一兩去蘆切片甘草半兩炙銼阿膠半兩銼碎用蚌粉炒泡起卻篩去粉用之上為粗散每服三大錢水一盞半入蔥白一莖拍破煎八分去滓食前溫服未定再服神妙千金丸治産前産後一切風冷血氣等疾産前胎氣不安腰腹多疼四肢疲倦妊娠臨月預合下每日空心一服臨産五臟不痛易産蓐中不生諸疾兼治産後惡血不盡及胎衣不下憎寒壯熱吐逆煩悶皮膚虛腫或血暈狂迷眼見神鬼能補勻血氣金叉石斛一分別搗為細末秦艽去蘆須洗銼焙川椒去子微炒細辛去葉銼防風去苗銼貝母麩炒微黃熟乾地黃切酒浸焙糯米甘草炙各一兩當歸去蘆須洗焙大麻仁去殼取仁黃芩尖如錐者乾薑炮銼大豆柏旋以黑豆生芽長二寸焙乾用各三分石膏半分軟者火煅上精擇為末以煉蜜成劑入木臼中杵一千下分為七十二丸擇除破天德月德月合日合每服一丸溫酒化下産前産後赤白帶下溫酒嚼下産前後或心痛血氣用薄荷湯嚼下月信不通當歸酒下臨産艱難或三五日難産及胎衣不下子死腹中橫生倒産死絶不語但心頭有熱氣用藥一丸京棗湯研化灌之下咽立瘥産後惡血不盡臍腹疼痛嘔吐壯熱憎寒煩悶月候不調或多或少肢體倦怠皮膚浮腫産血不止虛勞中風口噤不語半身不遂産前後赤白痢大小便祕澀血暈狂語頭痛面色痿黃漸成勞瘦飲食無味並溫酒化下一丸産前臨月每旦一丸至臨産用當歸酒下一二丸催生五臟不痛子易生論欲産併産後凡欲生産切不得喧鬧産婦房門常須關閉選一年高性和善産婆又選穩審恭謹家人一二人扶持切不用揮霍致令産婦憂恐又忌間雜外人喪孝穢濁之人瞻視若不謹之定是難産兼傷小兒若腹中痛來但令扶行或行不得且立候行得更行或痛作陳眼中如火生此是兒回轉即進琥珀散一服直至行不得即扶上蓐草務要産婦惜力或心中熱悶取白蜜一匙新汲水調下或未解即吃生雞子一枚琥珀散臨月縮胎催生兼治産後諸疾川芎一兩銼略焙當歸一兩半去蘆須切焙上為末每服三錢水一盞酒半盞煎八分去滓不計時候服大凡生産自有時候痛不甚者名曰弄痛宜須強行熟忍宜食軟飯若食飯不得即宜食粥及飲蜜漿勿令飢渴恐産婦無力困乏若經時不産進通靈散一丸若生畢暖少許醋墨與呷以童子小便調七寶散一服心中自然開爽不住燒磚石以醋沃之直至七日要令産婦鼻中常聞醋氣宜燒茅香白朮皂莢等物切勿令見穢惡右産訖忽覺心中昏悶或眼花如在舟車中即是血暈急須服牡丹飲子黑神散催生通靈散又一方在下卷産科雜方門蛇脫皮一條全者緊卷以蚯蚓泥裹燒黑近藥處泥些小用無妨上為末每服一錢溫酒調下七寶散初産後勻血和氣補虛壓驚悸硃砂研如粉桂心去皮不見火銼乾薑炮去濕氣當歸去蘆須洗焙川芎銼碎略焙人參去蘆切片羚羊角灰茯苓銼上件等分杵研為末若産婦平和三臘以前直至滿月每日各取一字以羌活豆淋酒調下空心服若覺心胸煩熱即減薑桂冷即加之腹痛加當歸心悶加羚羊角心胸虛氣加桂不下食或噁心加人參虛戰加茯苓以意斟酌日二夜一服不飲酒者以童子小便調卻暖過服之牡丹飲子療産後血暈悶亂神昏若口噤即斡開口灌必效牡丹皮洗銼大黃生用銼碎芒硝別研後入各一兩冬瓜子半合桃仁三七個湯浸去皮尖上為粗散每服五大錢水三盞煎至一盞半去滓入芒硝服之凡欲産先煎下以備緩急單方黑神散防暈備急驢護千不計多少以桑柴火燒以刀刮取黑煤更燒更刮令盡研為末入真麝香少許如才産了及覺血衝心暈悶取一錢末以熱酒和童子小便調下若産後心空但時與琥珀散一服或煎芍藥湯進之更不用它治常進溫粥勿與熱食如食熱則滯血或三五日內但覺腹中痛兒枕未定即進定痛散一服琥珀散依第三項芍藥湯治産後虛乏不思飲食四肢疲倦心腹陳痛補虛治氣當歸一兩半去蘆須洗切焙乾用芍藥洗銼人參去蘆切片肉桂去皮不見火銼生薑後入甘草炙各一兩生乾地黃二兩洗酒浸焙上銼杵為粗散每服三大錢水二盞入棗二枚煎至一盞去滓放溫服日三服定痛散治産後惡血不止腹內熱痛不可忍及兒枕未定當歸洗去蘆須切焙芍藥洗各二兩桂心一兩或體蒸熱以川芎代之上為末每服二錢水酒共一盞生薑一塊彈子大擘破同煎至六分去滓溫服之若産後四肢安和亦不用多吃酒藥緣氣虛禁持未得卻多昏眩唯飲童子小便無妨勿平身且側臥夜常須一人看承令屈起兩膝臥睡即須頻喚覺虛羸困乏即空心進理中丸七寶散七日外恐吃粥無味或虛乏無力即爛煮羊肉汁黃雌雞汁作粥未可吃肉亦不可傷及吃硬物便成積滯之患常以淨黑豆一升炒令煙出以酒五升澆淋入羌活一兩槌碎同浸常用此酒下藥或時飲一盞大避風邪令諸疾不生四順理中丸治新産後臟腑虛不思飲食補養五臟甘草三兩炙銼人參去蘆切片白朮銼焙乾薑泡去濕氣各二兩上為末煉蜜丸梧桐子大每服十五丸至二十九空心溫酒下七寶散依前項若三日後覺壯熱頭痛此是乳脈行即進玉露散二服或大小便祕澀或發寒熱頭痛四肢如碎此是蓐勞或産後大渴胎損唄你咳嗽別生他疾及帶起宿患亦宜檢尋別方治之月內不宜多語笑強起離床行或作針線運動恣食生硬不避風脫衣洗浴當時雖未覺大損滿月後或成蓐勞手腳及腰腿痠重冷痛骨髓間颼颼如風吹縱有名醫卒不能療大都産婦將息須是百日方可平復大忌犯觸因此多致身體強直如角弓反張名曰蓐風遂至不救小可虛羸失於將補便成大患終身悔不及矣戒之戒之玉露散治産後乳脈行煩熱或大腸滯澀肢體疼痛涼膈壓熱下乳茯苓銼人參去蘆切片甘草炙各半兩桔梗去蘆切焙白芷洗銼川芎洗銼各一兩川大黃濕紙裹慢火煨熟銼當歸去蘆須切各一分芍藥三分洗銼上為末每服二平錢水一盞煎至七分溫服日三服若臟腑泄瀉即除川大黃
