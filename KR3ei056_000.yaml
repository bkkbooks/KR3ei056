body:
  text: 重雕宋本衛生家寶産科備要敘産科之有專書始於唐楊師厚之産乳集驗方太和中咱殷産寶總之北宋則有李師聖之産育寶慶集沈虞卿之衛生産科方南宋則有虞流之備産濟用方陸子正之胎産集驗方今皆不傳寶慶集維著録四庫全書從永樂大典録出經陳言等增刪亦非原本醫書之鮮善本久矣産科其尤甚者也衛生家寶産科備要八卷宋朱瑞章輯宋史藝文志篇於録明文淵閣書目亦有其書四庫全書未收阮文達亦未見錢遵王讀書敏術記載有宋本於瑞章仕歷則未詳也朱瑞章福建長樂縣人淳熙中知江西南康軍寬以愛民廉以律己護設官田於白鹿洞學以贍四方來學者著有衛生家寶方六卷衛生小兒方一卷衛生家寶湯方二卷及此書見宋史藝文志乾隆江西通志蓋南宋良吏有心於濟世救民者非醫士也卷一入月安産法體元子借地法逐月藏衣遊神法本之外臺祕要禁草禁水催生符法出聖濟總録卷二卷三皆採之孫真人千金方卷四全録産育寶慶集張世臣纍用經效方卷五則採之瀘江助教劉寶經驗名方者居多卷六則全録備産濟用方及許叔微本事方中胎産諸方卷七則全録胎産經驗方卷八則雜采葛氏時後巢氏病源千金外臺聖惠萬全小兒集驗嬰童寶鑑錢乙張渙諸書保育小兒諸法李陸兩集賴此以存虞張之方尤為自來著録所罕見洵乎産科之薈萃醫家之指南也豫少多疾病喜讀方書每當衆論荊棘之時略試其技亦嘗奏效婦人小兒望問皆窮尤難製劑丙子之歲細君臨娩胎死腹中三日不下諸醫束手甲申九月家婦將娩而瘧作瘧發之際心痛欲死醫亦無策余細心診問博考方書幸賴此書轉危為安細君懲勇付梓爰雕印以廣其傳差乎秦漢以來醫書經林億孫兆校定未必君合於古德猶無大失也明人一再重刊無不妄刪妄改襲謬承訛固已失之毫釐繆以千里而況庸人以醫為市目不知書迂儒食古不化刻舟求劍乎以此治疾是益之危而速之死也婦科為醫家九科之一産又婦科之一端自束實鮮專書即有亦鮮善本是編採托宏富持擇精詳所願家置一編而深求之於保産全嬰之道其庶幾乎光緒十三年歲在疆梧大淵獻壯月既死霸誥援榮祿大夫三品頂戴前分巡廣東南韶連兵備道兼管水利太平關監督加四級歸安陸心源書於穰梨館
